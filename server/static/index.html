<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servo Controller</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--panel:#111115;--card:#18181e;--input:#1e1e26;--hover:#222230;
  --border:#2a2a38;--brite:#3a3a50;
  --green:#22c55e;--green2:#16a34a;--amber:#f59e0b;--red:#ef4444;--blue:#38bdf8;
  --fg:#e2e8f0;--fg2:#94a3b8;--fg3:#475569;
  --mono:'Consolas','Courier New',monospace;--ui:'Segoe UI',system-ui,sans-serif;--r:4px;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--ui);font-size:13px;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--brite);border-radius:3px}

button{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:.4px;
  border:1px solid var(--border);border-radius:var(--r);background:var(--card);
  color:var(--fg);padding:4px 10px;cursor:pointer;transition:all .12s;text-transform:uppercase}
button:hover:not(:disabled){background:var(--hover);border-color:var(--brite);color:#fff}
button:active:not(:disabled){transform:scale(.97)}
button:disabled{opacity:.3;cursor:not-allowed}
.btn-green{background:rgba(34,197,94,.12);border-color:var(--green2);color:var(--green)}
.btn-green:hover:not(:disabled){background:rgba(34,197,94,.22);box-shadow:0 0 8px rgba(34,197,94,.25)}
.btn-amber{background:rgba(245,158,11,.1);border-color:#92400e;color:var(--amber)}
.btn-amber:hover:not(:disabled){background:rgba(245,158,11,.2)}
.btn-red{background:rgba(239,68,68,.1);border-color:#7f1d1d;color:var(--red)}
.btn-red:hover:not(:disabled){background:rgba(239,68,68,.2);box-shadow:0 0 8px rgba(239,68,68,.25)}
.btn-blue{background:rgba(56,189,248,.08);border-color:#075985;color:var(--blue)}
.btn-blue:hover:not(:disabled){background:rgba(56,189,248,.15)}
.btn-sm{padding:3px 8px;font-size:11px}

input,select{font-family:var(--mono);font-size:12px;background:var(--input);color:var(--fg);
  border:1px solid var(--border);border-radius:var(--r);padding:3px 6px;outline:none;transition:border-color .12s}
input:focus,select:focus{border-color:var(--green2)}
input[type=number]{text-align:right}
input[type=checkbox]{width:13px;height:13px;accent-color:var(--amber);cursor:pointer}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.ph{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--fg2);background:var(--card);padding:6px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px}
.ph::before{content:'//';color:var(--fg3)}
.pb{padding:10px 12px}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;gap:8px;padding:0 12px;height:40px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0}
#main{display:grid;grid-template-columns:240px 1fr 1fr;grid-template-rows:auto 1fr;
  gap:7px;padding:7px;flex:1;overflow:hidden;min-height:0}

/* Topbar */
#logo{font-family:var(--mono);font-size:13px;font-weight:bold;color:var(--green);
  letter-spacing:2px;white-space:nowrap}
#dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;
  box-shadow:0 0 5px var(--red);transition:all .3s}
#dot.idle{background:var(--green);box-shadow:0 0 6px var(--green)}
#dot.running{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 1s infinite}
#state-text{font-family:var(--mono);font-size:11px;letter-spacing:1px}
#port-badge{font-family:var(--mono);font-size:10px;color:var(--fg2);
  background:var(--input);border:1px solid var(--border);border-radius:2px;padding:1px 6px}
#port-select{width:190px;font-size:11px}
.tb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.spacer{flex:1}
#http-label{font-family:var(--mono);font-size:9px;color:var(--fg3);letter-spacing:1px}

/* Left col: Servo Manager */
#left-col{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;gap:7px;overflow:hidden}
#servo-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#servo-list{flex:1;overflow-y:auto;padding:4px 0}

.servo-row{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-bottom:1px solid var(--border);transition:background .1s}
.servo-row:hover{background:var(--hover)}
.srv-id{font-family:var(--mono);font-size:11px;color:var(--fg2);width:22px;flex-shrink:0}
.srv-dot{font-size:11px;color:var(--fg3);flex-shrink:0;transition:color .2s}
.srv-dot.on{color:var(--green)}
.srv-pin-label{font-family:var(--mono);font-size:10px;color:var(--fg3);width:30px;flex-shrink:0}
.srv-pin-label.on{color:var(--green)}
.srv-pin{width:46px;font-size:11px;padding:2px 4px}
.srv-btns{display:flex;gap:3px;margin-left:auto;flex-shrink:0}

#servo-bulk{display:flex;gap:5px;padding:7px 10px;border-top:1px solid var(--border);flex-shrink:0}

/* Mid col */
#mid-col{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;gap:7px;overflow:hidden}
#step-panel{flex-shrink:0}
#script-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Step form */
#step-grid{padding:8px 10px 4px}
.step-mini-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.step-mini-table th{background:var(--card);color:var(--fg2);font-size:9px;letter-spacing:1px;padding:5px 6px;text-align:left;border-bottom:1px solid var(--brite);font-weight:normal}
.step-mini-table td{padding:3px 6px;border-bottom:1px solid var(--border)}
.step-mini-table td input[type=number]{width:62px;padding:2px 4px}
.step-mini-table input[type=number]{text-align:center}
.sid-input{color:var(--amber) !important;font-weight:bold}
#canvas-area{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 10px 4px}
#home-desc{font-family:var(--mono);font-size:10px;line-height:1.7;color:var(--green)}
#step-btns{display:flex;gap:6px;padding:0 10px 8px}
.step-home-cell{text-align:center;white-space:nowrap}

/* Script */
#script-tb{display:flex;align-items:center;gap:5px;padding:6px 10px;
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#script-tb label{color:var(--fg2);font-size:11px;display:flex;align-items:center;gap:4px}
.tb-sep2{width:1px;height:14px;background:var(--border)}
#table-wrap{flex:1;overflow-y:auto;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
thead th{position:sticky;top:0;z-index:1;background:var(--card);color:var(--fg2);
  font-size:9px;letter-spacing:1px;padding:5px 6px;text-align:left;
  border-bottom:1px solid var(--brite);font-weight:normal}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:grab}
tbody tr:hover{background:var(--hover)}
tbody tr.drag-over{border-top:2px solid var(--green2)}
tbody tr.dragging{opacity:.3}
td{padding:2px 3px;vertical-align:middle}
.drag-col{color:var(--fg3);text-align:center;width:18px;font-size:13px;cursor:grab}
td input[type=number]{width:62px;padding:2px 4px}
tbody td input[type=number]{text-align:center}
td input.sid-col{color:var(--amber)}
.home-sel{width:44px;font-size:11px;padding:2px 3px;text-align:center}
.del-btn{background:none;border:none;color:var(--fg3);padding:2px 5px;font-size:12px;cursor:pointer}
.del-btn:hover{color:var(--red)}
.home-col{text-align:center}
.home-switch{position:relative;display:inline-block;width:36px;height:20px;vertical-align:middle}
.home-switch input{opacity:0;width:0;height:0;position:absolute}
.home-slider{position:absolute;inset:0;cursor:pointer;background:var(--input);border:1px solid var(--border);border-radius:999px;transition:.15s}
.home-slider:before{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--fg2);transition:.15s}
.home-switch input:checked + .home-slider{background:rgba(34,197,94,.2);border-color:var(--green2)}
.home-switch input:checked + .home-slider:before{transform:translateX(16px);background:var(--green)}
.home-mark{display:inline-block;width:14px;margin-left:6px;font-family:var(--mono);font-size:11px;color:var(--fg2);text-align:left}
.pop-input{cursor:pointer !important}
.pop-input:hover{background:var(--hover) !important;border-color:var(--green2) !important}

/* Popover Slider */
.popover{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;box-shadow:0 10px 25px rgba(0,0,0,.5);z-index:9999;display:none;flex-direction:column;gap:8px;min-width:200px}
.popover.show{display:flex}
.popover-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--fg2)}
.popover-input{display:flex;align-items:center;gap:8px}
.popover-input input[type=range]{flex:1;height:6px;background:var(--border);border:none;border-radius:3px;outline:none;-webkit-appearance:none;appearance:none}
.popover-input input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--green);cursor:pointer}
.popover-input input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--green);border:none;cursor:pointer}
.popover-input input[type=number]{width:88px;min-width:88px;text-align:center;padding:4px 6px;font-size:12px}

#empty-hint{padding:20px;text-align:center;color:var(--fg3);font-family:var(--mono);font-size:11px}

/* Right col */
#right-col{grid-column:3;grid-row:1/3;display:flex;flex-direction:column;gap:7px;overflow:hidden}

/* Progress */
#prog-nums{display:flex;align-items:baseline;gap:4px;padding:8px 10px 4px}
#prog-cur{font-family:var(--mono);font-size:26px;color:var(--green);line-height:1}
#prog-sep{color:var(--fg3);font-size:15px}
#prog-tot{font-family:var(--mono);font-size:17px;color:var(--fg2)}
#loop-badge{font-family:var(--mono);font-size:9px;color:var(--amber);
  border:1px solid var(--amber);padding:1px 5px;border-radius:2px;margin-left:4px;
  animation:pulse 1.5s infinite;display:none}
#prog-pct{font-family:var(--mono);font-size:11px;color:var(--green2);margin-left:auto}
#prog-track{height:3px;background:var(--input);margin:0 10px 6px;border-radius:2px;overflow:hidden}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--green2),var(--green));
  width:0%;transition:width .3s;box-shadow:0 0 5px var(--green)}
#last-msg{padding:0 10px 8px;font-family:var(--mono);font-size:10px;color:var(--fg2);min-height:16px}

/* Controls */
#ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px 10px}
#btn-stop{grid-column:1/-1;padding:7px}
#btn-run,#btn-loop{padding:7px}

/* Quick */
#quick-row{display:flex;gap:6px;padding:8px 10px}

/* Serial Monitor */
#serial-panel{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
#serial-header{display:flex;align-items:center}
#serial-header .ph{flex:1}
#filter-input{width:65px;font-size:10px;padding:2px 4px;margin-right:4px}
#auto-cb-wrap{display:flex;align-items:center;gap:3px;padding:0 5px;font-size:10px;color:var(--fg2);cursor:pointer}
#serial-out{flex:1;overflow-y:auto;padding:5px 8px;font-family:var(--mono);font-size:11px;line-height:1.65}
.s-line{display:flex;gap:7px;animation:fadein .1s}
.s-ts{color:var(--fg3);flex-shrink:0;font-size:10px;line-height:1.8}
.c-ok{color:var(--green)}.c-run{color:var(--amber)}.c-err{color:var(--red)}
.c-send{color:var(--blue)}.c-dim{color:var(--fg2)}.c-att{color:#a3e635}
#manual-row{display:flex;align-items:center;gap:5px;padding:5px 8px;
  border-top:1px solid var(--border);flex-shrink:0}
#manual-prefix{font-family:var(--mono);color:var(--blue);font-size:12px}
#manual-input{flex:1;font-size:11px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- Topbar -->
<div id="topbar">
  <div id="logo">[SERVO CTRL]</div>
  <div class="tb-sep"></div>
  <div id="dot"></div>
  <span id="state-text" style="color:var(--fg2)">DISCONNECTED</span>
  <span id="port-badge" style="display:none"></span>
  <div class="tb-sep"></div>
  <select id="port-select"><option value="">— Auto Detect —</option></select>
  <button id="btn-refresh" title="Refresh">⟳</button>
  <button id="btn-conn" class="btn-green">CONNECT</button>
  <div class="spacer"></div>
  <span id="http-label">HTTP :7070</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Left: Servo Manager -->
  <div id="left-col">
    <div id="servo-panel" class="panel">
      <div class="ph">Servo Manager</div>
      <div id="servo-list"></div>
      <div id="servo-bulk">
        <button class="btn-green btn-sm" onclick="attachAll()" style="flex:1">ATTACH ALL</button>
        <button class="btn-red btn-sm"   onclick="detachAll()" style="flex:1">DETACH ALL</button>
      </div>
    </div>

    <!-- Quick commands -->
    <div class="panel" style="flex-shrink:0">
      <div class="ph">Quick Commands</div>
      <div id="quick-row">
        <button class="btn-blue  btn-sm" onclick="rawCmd('PING')">PING</button>
        <button class="btn-amber btn-sm" onclick="rawCmd('STATUS')">STATUS</button>
        <button class="btn-red   btn-sm" onclick="apiStop()">STOP</button>
      </div>
    </div>
  </div>

  <!-- Mid: Step + Script -->
  <div id="mid-col">

    <!-- Single Step -->
    <div id="step-panel" class="panel">
      <div class="ph">Single Step</div>
      <div id="canvas-area">
        <canvas id="servo-canvas" width="96" height="92"></canvas>
        <div id="home-desc">home=1<br>After done<br>Return to 0°</div>
      </div>
      <div id="step-grid">
        <table class="step-mini-table">
          <thead><tr>
            <th>DELAY ms</th><th>SID</th><th>ANGLE °</th><th>SPEED</th><th>HOLD ms</th><th>HOME</th>
          </tr></thead>
          <tbody><tr>
            <td><input type="number" id="s-delay" value="1000" min="0" max="30000" step="500"></td>
            <td><input type="number" id="s-sid" value="1" min="1" max="6" class="sid-input"></td>
            <td><input type="number" id="s-angle" value="15" min="0" max="180" oninput="drawCanvas()"></td>
            <td><input type="number" id="s-speed" value="50" min="1" max="100"></td>
            <td><input type="number" id="s-dur" value="100" min="0" max="10000" step="100"></td>
            <td class="step-home-cell">
              <label class="home-switch" onclick="event.stopPropagation()">
                <input type="checkbox" id="s-home" checked onchange="setHome(this.checked?1:0)" onclick="event.stopPropagation()">
                <span class="home-slider"></span>
              </label>
              <span class="home-mark" id="s-home-mark">1</span>
            </td>
          </tr></tbody>
        </table>
      </div>
      <div id="step-btns">
        <button class="btn-green" onclick="sendStep()">▶ Send Step</button>
        <button onclick="previewStep()">Preview Command</button>
        <button class="btn-blue" onclick="addStepFromUI()">＋ Add to Script</button>
      </div>
    </div>

    <!-- Script Editor -->
    <div id="script-panel" class="panel">
      <div class="ph">Script Editor
        <span id="step-count" style="font-size:9px;color:var(--green2);
          background:rgba(34,197,94,.08);border:1px solid var(--border);
          padding:1px 5px;border-radius:2px;margin-left:4px">0 STEPS</span>
      </div>
      <div id="script-tb">
        <button class="btn-sm" onclick="importJSON()">Import JSON</button>
        <button class="btn-sm" onclick="exportJSON()">Export JSON</button>
        <div class="tb-sep2"></div>
        <label><input type="checkbox" id="export-attach-cb" checked> Include Attach Cmd</label>
        <label><input type="checkbox" id="loop-cb"> Loop</label>
        <div class="spacer"></div>
        <button class="btn-green btn-sm" id="btn-run-script" onclick="runScript(false)">▶ Run</button>
        <button class="btn-red   btn-sm" id="btn-stop" onclick="apiStop()">■ STOP</button>
      </div>
      <div id="table-wrap">
        <table>
          <thead><tr>
            <th style="width:18px"></th>
            <th>DELAY ms</th><th>SID</th><th>ANGLE °</th>
            <th>SPEED</th><th>HOLD ms</th><th>HOME</th>
            <th style="width:24px"></th>
          </tr></thead>
          <tbody id="steps-tbody"></tbody>
        </table>
        <div id="empty-hint">// NO STEPS YET</div>
      </div>
    </div>
  </div>

  <!-- Right: Progress + Serial -->
  <div id="right-col">

    <!-- Progress -->
    <div class="panel" style="flex-shrink:0">
      <div class="ph">Progress</div>
      <div id="prog-nums">
        <span id="prog-cur">—</span><span id="prog-sep">/</span>
        <span id="prog-tot">—</span>
        <span id="loop-badge">LOOP</span>
        <span id="prog-pct"></span>
      </div>
      <div id="prog-track"><div id="prog-fill"></div></div>
      <div id="last-msg"></div>
    </div>

    <!-- Serial Monitor -->
    <div id="serial-panel" class="panel">
      <div id="serial-header">
        <div class="ph" style="flex:1">Serial Monitor</div>
        <input id="filter-input" placeholder="filter…" oninput="renderLog()">
        <label id="auto-cb-wrap"><input type="checkbox" id="auto-scroll" checked> AUTO</label>
      </div>
      <div id="serial-out"></div>
      <div id="manual-row">
        <span id="manual-prefix">>></span>
         <input id="manual-input" placeholder="Enter command..."
               onkeydown="if(event.key==='Enter')manualSend()">
         <button class="btn-sm" onclick="manualSend()">Send</button>
      </div>
    </div>
  </div>

</div><!-- main -->
</div><!-- app -->

<input type="file" id="file-input" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ════════════════════════════════════════
//  Constants & State
// ════════════════════════════════════════
const MAX_SERVOS  = 6;
const DEFAULT_PINS = [9,10,11,6,5,3];

let steps      = [];
let homeVal    = 1;
let logLines   = [];
let wsConn     = null;
let stepIdCnt  = 0;
let dragSrc    = null;
let importedServos = {};
let importedAttachCmds = [];

// Servo state {sid: pin} or {}
let attachedMap = {};
// Local pin settings (for UI)
let pinSettings = [...DEFAULT_PINS];

const isConn = () => ['idle','running'].includes(getState());
let   _state = 'disconnected';
const getState = () => _state;

// ════════════════════════════════════════
//  WebSocket
// ════════════════════════════════════════
function wsConnect() {
  wsConn = new WebSocket(`ws://${location.host}/ws`);
  wsConn.onopen = () => addLog('WS connected', 'c-dim');
  wsConn.onmessage = e => {
    try { handleWS(JSON.parse(e.data)); } catch(_){}
  };
  wsConn.onclose = () => {
    addLog('WS disconnected, reconnecting in 3s...','c-err');
    setTimeout(wsConnect, 3000);
  };
  wsConn.onerror = () => wsConn.close();
}

function handleWS(msg) {
  if (msg.type === 'serial')   addLog('← '+msg.line, classifyLine(msg.line));
  else if (msg.type === 'status') applyStatus(msg);
  else if (msg.type === 'attached') { attachedMap = intKeys(msg.attached||{}); renderServoList(); }
  else if (msg.type === 'done')   { applyStatus({state:'idle'}); setProgress(null,null); setLastMsg('✔ Completed'); document.getElementById('loop-badge').style.display='none'; }
  else if (msg.type === 'error')  { addLog('ERR '+msg.message,'c-err'); setLastMsg('✘ '+msg.message); }
}

function classifyLine(l) {
  if (['OK READY','OK DONE','OK PONG','OK IDLE','OK STOPPED'].some(s=>l.startsWith(s))) return 'c-ok';
  if (l.startsWith('OK RUNNING')||l.startsWith('OK LOOP')) return 'c-run';
  if (l.startsWith('OK ATTACH')||l.startsWith('OK DETACH')) return 'c-att';
  if (l.startsWith('ERR')) return 'c-err';
  return 'c-dim';
}

function intKeys(obj) {
  const r={};
  Object.entries(obj).forEach(([k,v])=>{ r[parseInt(k)]=v; });
  return r;
}

// ════════════════════════════════════════
//  UI State
// ════════════════════════════════════════
function applyStatus(msg) {
  _state = msg.state || 'disconnected';
  const dot   = document.getElementById('dot');
  const stTxt = document.getElementById('state-text');
  const badge = document.getElementById('port-badge');
  dot.className = '';
  if (_state === 'idle') {
    dot.classList.add('idle'); stTxt.style.color='var(--green)'; stTxt.textContent='IDLE';
    if (msg.port) { badge.style.display=''; badge.textContent=msg.port; } else badge.style.display='none';
  } else if (_state === 'running') {
    dot.classList.add('running'); stTxt.style.color='var(--amber)'; stTxt.textContent='RUNNING';
    if (msg.step!=null && msg.total!=null) setProgress(msg.step, msg.total);
  } else {
    stTxt.style.color='var(--fg2)'; stTxt.textContent='DISCONNECTED'; badge.style.display='none';
  }
  if (msg.attached) { attachedMap = intKeys(msg.attached); renderServoList(); }

  const conn=isConn(), run=_state==='running';
  document.getElementById('btn-conn').textContent      = conn ? 'DISCONNECT':'CONNECT';
  document.getElementById('btn-conn').className        = conn ? 'btn-red':'btn-green';
  const btnRun = document.getElementById('btn-run');
  const btnLoop = document.getElementById('btn-loop');
  const btnLoopScript = document.getElementById('btn-loop-script');
  if (btnRun) btnRun.disabled = !conn||run;
  if (btnLoop) btnLoop.disabled = !conn||run;
  document.getElementById('btn-run-script').disabled   = !conn||run;
  if (btnLoopScript) btnLoopScript.disabled = !conn||run;
  document.getElementById('btn-stop').disabled         = !conn||!run;
  renderServoList();
}

function setProgress(cur, tot) {
  document.getElementById('prog-cur').textContent = cur!=null ? cur : '—';
  document.getElementById('prog-tot').textContent = tot!=null ? tot : '—';
  const pct = (cur!=null&&tot>0) ? Math.round(cur/tot*100) : 0;

function renderServoList() {
  const list = document.getElementById('servo-list');
  list.innerHTML = '';
  for (let i=0; i<MAX_SERVOS; i++) {
    const sid  = i+1;
    const isAtt= attachedMap[sid] != null;
    const pin  = isAtt ? attachedMap[sid] : pinSettings[i];

    const row  = document.createElement('div');
    row.className = 'servo-row';
    row.innerHTML = `
      <span class="srv-id">S${sid}</span>
      <span class="srv-dot ${isAtt?'on':''}">●</span>
      <span class="srv-pin-label ${isAtt?'on':''}">D${pin}</span>
      ${isAtt
        ? `<span style="font-family:var(--mono);font-size:10px;color:var(--green);flex:1">Attached</span>`
        : `<input type="number" class="srv-pin" value="${pin}" min="2" max="13"
             oninput="pinSettings[${i}]=parseInt(this.value)||${DEFAULT_PINS[i]}"
             onchange="pinSettings[${i}]=parseInt(this.value)||${DEFAULT_PINS[i]}">`
      }
      <div class="srv-btns">
        ${!isAtt
          ? `<button class="btn-green btn-sm" onclick="attachServo(${sid},${i})" ${isConn()?'':'disabled'}>ATTACH</button>`
          : `<button class="btn-red btn-sm"   onclick="detachServo(${sid})"      ${isConn()?'':'disabled'}>DETACH</button>`
        }
      </div>`;
    list.appendChild(row);
  }
}

async function attachServo(sid, idx) {
  const pin = pinSettings[idx];
  const res = await fetch('/api/attach', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({sid, pin})
  });
  const data = await res.json();
  if (res.ok) {
    attachedMap = intKeys(data.attached||{});
    renderServoList();
    addLog(`→ ATTACH ${sid} ${pin}`, 'c-send');
  } else {
    addLog('✘ ATTACH failed: '+(data.detail||''), 'c-err');
  }
}

async function detachServo(sid) {
  const res = await fetch('/api/detach', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({sid})
  });
  const data = await res.json();
  if (res.ok) {
    attachedMap = intKeys(data.attached||{});
    renderServoList();
    addLog(`→ DETACH ${sid}`, 'c-send');
  } else {
    addLog('✘ DETACH failed: '+(data.detail||''), 'c-err');
  }
}

async function attachAll() {
  const servos = {};
  for (let i=0; i<MAX_SERVOS; i++) servos[i+1] = pinSettings[i];
  const res = await fetch('/api/attach_all', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({servos})
  });
  const data = await res.json();
  if (res.ok) {
    attachedMap = intKeys(data.attached||{});

    addLog('→ ATTACH ALL', 'c-send');

}

async function detachAll() {

function normalizeDelayMs(v) {
  const n = isNaN(parseInt(v)) ? 0 : parseInt(v);
  return Math.max(0, Math.min(30000, Math.round(n / 500) * 500));
}

function normalizeHoldMs(v) {
  const n = isNaN(parseInt(v)) ? 0 : parseInt(v);
  return Math.max(0, Math.min(10000, Math.round(n / 100) * 100));
}

function getStepParams() {
  const delay = normalizeDelayMs(document.getElementById('s-delay').value);
  const hold  = normalizeHoldMs(document.getElementById('s-dur').value);
  document.getElementById('s-delay').value = delay;
  document.getElementById('s-dur').value = hold;
  return {
    delay_ms:    delay,
    servo_id:    parseInt(document.getElementById('s-sid').value)||1,
    angle:       parseInt(document.getElementById('s-angle').value)||0,
    speed:       parseInt(document.getElementById('s-speed').value)||60,
    duration_ms: hold,
    home:        homeVal,
  };
}

async function sendStep() {
  const p   = getStepParams();
  const sid = p.servo_id;
  drawCanvas();
  if (!attachedMap[sid]) {
    const pin = pinSettings[sid-1];
    if (!confirm(`Servo ${sid} is not attached yet. Attach first on D${pin}?`)) return;
    await attachServo(sid, sid-1);
    await new Promise(r=>setTimeout(r,400));
  }
  const res = await fetch('/api/command', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(p)
  });
  const data = await res.json();
  if (res.ok) addLog(`→ STEP ${p.delay_ms} ${p.servo_id} ${p.angle} ${p.speed} ${p.duration_ms} ${p.home}`, 'c-send');
  else addLog('✘ '+(data.detail||'Send failed'), 'c-err');
}

function previewStep() {
  const p = getStepParams(); drawCanvas();
  addLog(`Preview: BEGIN 1 | STEP ${p.delay_ms} ${p.servo_id} ${p.angle} ${p.speed} ${p.duration_ms} ${p.home} | END`, 'c-dim');
}

function drawCanvas() {
  const angle = parseInt(document.getElementById('s-angle').value)||0;
  const c = document.getElementById('servo-canvas');
  const ctx = c.getContext('2d');
  const cx=48, cy=60, r=36;
  const rad=angle*Math.PI/180;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.beginPath(); ctx.arc(cx,cy,r,Math.PI,0,false);
  ctx.strokeStyle='#2a2a38'; ctx.lineWidth=2; ctx.stroke();
  if (homeVal===1&&angle>0) {
    // Draw return guide on the inner upper semicircle from 0°(right) to current angle.
    ctx.beginPath(); ctx.arc(cx,cy,r-6,0,-rad,true);
    ctx.strokeStyle='#1a4a1a'; ctx.lineWidth=1;
    ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);
  }
  // 0 -> 180 maps from right to left on the upper semicircle (counterclockwise)
  const ex=cx+r*Math.cos(rad), ey=cy-r*Math.sin(rad);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(ex,ey);
  ctx.strokeStyle=homeVal===1?'#22c55e':'#f59e0b'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fillStyle='#f59e0b'; ctx.fill();
  if (homeVal===1) {
    ctx.beginPath(); ctx.arc(cx+r,cy,3,0,Math.PI*2);
    ctx.strokeStyle='#22c55e'; ctx.lineWidth=1.5; ctx.fillStyle='#1a4a1a'; ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle='#e2e8f0'; ctx.font='11px Consolas'; ctx.textAlign='center';
  ctx.fillText(angle+'°', cx, cy+18);
}

function addStep(s) {
  const row = s || {delay_ms:1000, servo_id:1, angle:15, speed:50, duration_ms:100, home:1};
  row.delay_ms = normalizeDelayMs(row.delay_ms);
  row.duration_ms = normalizeHoldMs(row.duration_ms);
  row._id = ++stepIdCnt;
  steps.push(row);
  renderSteps();
}

function addStepFromUI() {
  const p = getStepParams();
  addStep(p);
  addLog(`→ Added to script: delay=${p.delay_ms} sid=${p.servo_id} angle=${p.angle} speed=${p.speed} hold=${p.duration_ms} home=${p.home}`, 'c-send');
}

function delStep(id) { steps=steps.filter(s=>s._id!==id); renderSteps(); }

function renderSteps() {
  const tbody = document.getElementById('steps-tbody');
  const hint  = document.getElementById('empty-hint');
  tbody.innerHTML = '';
  hint.style.display = steps.length ? 'none' : '';
  document.getElementById('step-count').textContent = steps.length+' STEPS';

  steps.forEach((s,i) => {
    const tr = document.createElement('tr');
    tr.dataset.id = s._id; tr.draggable = true;
    tr.innerHTML = `
      <td class="drag-col">⠿</td>
      <td><input type="number" class="pop-input" data-id="${s._id}" data-key="delay_ms" data-min="0" data-max="30000" data-step="500" value="${s.delay_ms}" min="0"   max="30000" step="500" onchange="updStep(${s._id},'delay_ms',this.value)"></td>
      <td><input type="number" class="pop-input" data-id="${s._id}" data-key="servo_id" data-min="1" data-max="6" value="${s.servo_id}"   min="1"   max="6"     onchange="updStep(${s._id},'servo_id',this.value)" class="sid-col"></td>
      <td><input type="number" class="pop-input" data-id="${s._id}" data-key="angle" data-min="0" data-max="180" value="${s.angle}"       min="0"   max="180"   onchange="updStep(${s._id},'angle',this.value)"></td>
      <td><input type="number" class="pop-input" data-id="${s._id}" data-key="speed" data-min="1" data-max="100" value="${s.speed}"       min="1"   max="100"   onchange="updStep(${s._id},'speed',this.value)"></td>
      <td><input type="number" class="pop-input" data-id="${s._id}" data-key="duration_ms" data-min="0" data-max="10000" data-step="100" value="${s.duration_ms}" min="0"   max="10000" step="100" onchange="updStep(${s._id},'duration_ms',this.value)"></td>
      <td class="home-col">
        <label class="home-switch" onclick="event.stopPropagation()">
          <input type="checkbox" ${s.home===1?'checked':''} onchange="setStepHome(${s._id}, this.checked)" onclick="event.stopPropagation()">
          <span class="home-slider"></span>
        </label>
        <span class="home-mark">${s.home===1?'1':'0'}</span>
      </td>
      <td><button class="del-btn" onclick="delStep(${s._id})">✕</button></td>`;

    tr.addEventListener('dragstart', e => { dragSrc=i; tr.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    tr.addEventListener('dragend',   () => { tr.classList.remove('dragging'); tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); });
    tr.addEventListener('dragover',  e => { e.preventDefault(); e.dataTransfer.dropEffect='move'; tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); tr.classList.add('drag-over'); });
    tr.addEventListener('drop',      e => { e.preventDefault(); if(dragSrc!==null&&dragSrc!==i){ const m=steps.splice(dragSrc,1)[0]; steps.splice(i,0,m); dragSrc=null; renderSteps(); } });
    
    // Add click handlers for popover sliders
    tr.querySelectorAll('.pop-input').forEach(inp => {
      inp.addEventListener('click', e => {
        e.stopPropagation();
        showPopover(inp);
      });
    });
    
    tbody.appendChild(tr);
  });
}

function showPopover(inp) {
  const id = inp.dataset.id;
  const key = inp.dataset.key;
  const min = parseInt(inp.dataset.min);
  const max = parseInt(inp.dataset.max);
  const step = parseInt(inp.dataset.step || '1');
  const reverse = key === 'angle';
  const val = parseInt(inp.value);
  
  const popover = document.getElementById('popover') || (() => {
    const p = document.createElement('div');
    p.id = 'popover';
    p.className = 'popover';
    p.innerHTML = `
      <div class="popover-title"></div>
      <div class="popover-input">
        <input type="range" id="pop-range" min="" max="" value="">
        <input type="number" id="pop-number" min="" max="">
      </div>`;
    document.body.appendChild(p);
    return p;
  })();
  
  popover.querySelector('.popover-title').textContent = key.toUpperCase();
  const rangeInput = popover.querySelector('#pop-range');
  const numInput = popover.querySelector('#pop-number');
  rangeInput.min = min;
  rangeInput.max = max;
  rangeInput.step = step;
  rangeInput.style.direction = reverse ? 'rtl' : 'ltr';
  rangeInput.value = val;
  numInput.min = min;
  numInput.max = max;
  numInput.step = step;
  numInput.value = val;
  
  const update = (v) => {
    rangeInput.value = v;
    numInput.value = v;
    inp.value = v;
    updStep(id, key, v);
  };
  
  rangeInput.oninput = () => update(rangeInput.value);
  numInput.oninput = () => update(numInput.value);
  
  const rect = inp.getBoundingClientRect();
  popover.style.left = (rect.left + window.scrollX) + 'px';
  popover.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popover.classList.add('show');
  
  const closePopover = () => {
    popover.classList.remove('show');
    document.removeEventListener('click', closePopover);
  };
  setTimeout(() => document.addEventListener('click', closePopover), 0);
}

function showSinglePopover(inp, title, min, max, step, onChange, reverse=false, avoidEl=null) {
  const val = parseInt(inp.value);
  const popover = document.getElementById('popover') || (() => {
    const p = document.createElement('div');
    p.id = 'popover';
    p.className = 'popover';
    p.innerHTML = `
      <div class="popover-title"></div>
      <div class="popover-input">
        <input type="range" id="pop-range" min="" max="" value="">
        <input type="number" id="pop-number" min="" max="">
      </div>`;
    document.body.appendChild(p);
    return p;
  })();

  popover.querySelector('.popover-title').textContent = title;
  const rangeInput = popover.querySelector('#pop-range');
  const numInput = popover.querySelector('#pop-number');
  rangeInput.min = min;
  rangeInput.max = max;
  rangeInput.step = step;
  rangeInput.style.direction = reverse ? 'rtl' : 'ltr';
  rangeInput.value = val;
  numInput.min = min;
  numInput.max = max;
  numInput.step = step;
  numInput.value = val;

  const update = (v) => {
    let n = isNaN(parseInt(v)) ? min : parseInt(v);
    n = Math.max(min, Math.min(max, n));
    if (step > 1) n = Math.round(n / step) * step;
    rangeInput.value = n;
    numInput.value = n;
    inp.value = n;
    onChange(n);
  };

  rangeInput.oninput = () => update(rangeInput.value);
  numInput.oninput = () => update(numInput.value);

  popover.classList.add('show');

  const rect = inp.getBoundingClientRect();
  const popRect = popover.getBoundingClientRect();
  const margin = 8;
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  let left = rect.left;
  let top = rect.bottom + 4;

  if (left + popRect.width > vw - margin) left = vw - popRect.width - margin;
  if (left < margin) left = margin;
  if (top + popRect.height > vh - margin) top = rect.top - popRect.height - 4;
  if (top < margin) top = margin;

  if (avoidEl) {
    const avoid = avoidEl.getBoundingClientRect();
    const overlap = !(left + popRect.width < avoid.left || left > avoid.right || top + popRect.height < avoid.top || top > avoid.bottom);
    if (overlap) {
      const leftCandidate = rect.left - popRect.width - 6;
      const rightCandidate = rect.right + 6;
      if (leftCandidate >= margin) {
        left = leftCandidate;
      } else if (rightCandidate + popRect.width <= vw - margin) {
        left = rightCandidate;
      } else {
        top = Math.max(margin, avoid.top - popRect.height - 6);
      }
    }
  }

  popover.style.left = (left + window.scrollX) + 'px';
  popover.style.top = (top + window.scrollY) + 'px';

  const closePopover = () => {
    popover.classList.remove('show');
    document.removeEventListener('click', closePopover);
  };
  setTimeout(() => document.addEventListener('click', closePopover), 0);
}

function bindSingleStepPopovers() {
  const bindings = [
    { id:'s-delay', title:'DELAY_MS', min:0, max:30000, step:500 },
    { id:'s-sid',   title:'SERVO_ID', min:1, max:6,     step:1   },
    { id:'s-angle', title:'ANGLE',    min:0, max:180,   step:1, reverse:true },
    { id:'s-speed', title:'SPEED',    min:1, max:100,   step:1   },
    { id:'s-dur',   title:'HOLD_MS',  min:0, max:10000, step:100 },
  ];

  bindings.forEach(cfg => {
    const el = document.getElementById(cfg.id);
    if (!el) return;
    el.classList.add('pop-input');
    el.addEventListener('click', e => {
      e.stopPropagation();
      const avoidEl = document.getElementById('canvas-area');
      showSinglePopover(el, cfg.title, cfg.min, cfg.max, cfg.step, () => {
        if (cfg.id === 's-angle') drawCanvas();
      }, !!cfg.reverse, avoidEl);
    });
  });
}

function updStep(id, key, val) {
  const s = steps.find(x=>x._id===id);
  if (s) {
    const parsed = isNaN(parseFloat(val)) ? 0 : parseInt(val);
    if (key === 'delay_ms') {
      s[key] = normalizeDelayMs(parsed);
    } else if (key === 'duration_ms') {
      s[key] = normalizeHoldMs(parsed);
    } else {
      s[key] = ['home','servo_id'].includes(key) ? parseInt(val) : parsed;
    }
  }
}

function setStepHome(id, checked) {
  const s = steps.find(x=>x._id===id);
  if (s) {
    s.home = checked ? 1 : 0;
    renderSteps();
  }
}

function exportJSON() {
  const includeAttach = document.getElementById('export-attach-cb').checked;
  let data;
  let filename;
  const exportedSteps = steps.map(({_id,...s})=>s);
  if (includeAttach) {
    const attachCmds = Object.entries(attachedMap)
      .map(([sid, pin]) => ({sid: parseInt(sid), pin: parseInt(pin)}))
      .sort((a, b) => a.sid - b.sid)
      .map(x => `ATTACH ${x.sid} ${x.pin}`);
    const hasSteps = exportedSteps.length > 0;
    data = {
      loop: hasSteps ? document.getElementById('loop-cb').checked : false,
      servos: attachedMap,
      attach_cmds: attachCmds,
      steps: hasSteps ? exportedSteps : [],
    };
    filename = hasSteps ? 'servo_script_with_attach.json' : 'servo_attach.json';
  } else {
    data = {
      loop: document.getElementById('loop-cb').checked,
      steps: exportedSteps,
    };
    filename = 'servo_script.json';
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download = filename; a.click();
}
function importJSON() { document.getElementById('file-input').click(); }
function handleImport(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload = ev => {
    try {
      const d=JSON.parse(ev.target.result);
      if (typeof d.loop==='boolean') document.getElementById('loop-cb').checked=d.loop;
      importedServos = (d.servos && typeof d.servos === 'object') ? d.servos : {};
      importedAttachCmds = Array.isArray(d.attach_cmds) ? d.attach_cmds.filter(x=>typeof x==='string') : [];
      if (Array.isArray(d.steps)) {
        steps = d.steps.map(s => ({
          ...s,
          delay_ms: normalizeDelayMs(s.delay_ms),
          duration_ms: normalizeHoldMs(s.duration_ms),
          _id: ++stepIdCnt,
        }));
        renderSteps();
      }
    } catch { addLog('✘ Invalid JSON format','c-err'); }
  };
  r.readAsText(file); e.target.value='';
}

async function runScript(forceLoop) {
  if (!steps.length && !importedAttachCmds.length) { addLog('⚠ Script is empty','c-err'); return; }
  const loop = forceLoop || document.getElementById('loop-cb').checked;
  document.getElementById('loop-badge').style.display = loop?'':'none';
  const servosToSend = Object.keys(importedServos).length ? importedServos : attachedMap;
  const body = {
    loop,
    servos: servosToSend,
    attach_cmds: importedAttachCmds,
    steps: steps.map(({_id,...s})=>(
      {
        ...s,
        delay_ms: normalizeDelayMs(s.delay_ms),
        duration_ms: normalizeHoldMs(s.duration_ms),
      }
    )),
  };
  const res  = await fetch('/api/run', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const data = await res.json();
  if (!res.ok) addLog('✘ '+(data.detail||'Run failed'),'c-err');
  else if (data.attach_only) addLog('→ ATTACH phase completed','c-send');
  else         addLog(`→ RUN ${steps.length} steps loop=${loop}`,'c-send');
}

// ════════════════════════════════════════
//  Serial Log
// ════════════════════════════════════════
function addLog(text, cls='c-dim') {
  const ts=new Date().toLocaleTimeString('zh-TW',{hour12:false});
  logLines.push({ts,text,cls});
  if (logLines.length>500) logLines.shift();
  renderLog();
}
function renderLog() {
  const filter=document.getElementById('filter-input').value.toLowerCase();
  const out=document.getElementById('serial-out');
  const lines=filter?logLines.filter(l=>l.text.toLowerCase().includes(filter)):logLines;
  out.innerHTML=lines.map(l=>`<div class="s-line"><span class="s-ts">${l.ts}</span><span class="${l.cls}">${esc(l.text)}</span></div>`).join('');
  if (document.getElementById('auto-scroll').checked) out.scrollTop=out.scrollHeight;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function manualSend() {
  const inp=document.getElementById('manual-input');
  const cmd=inp.value.trim(); if(!cmd) return;
  rawCmd(cmd); inp.value='';
}

// ════════════════════════════════════════
//  Init
// ════════════════════════════════════════
document.getElementById('btn-conn').onclick    = toggleConnect;
document.getElementById('btn-refresh').onclick = refreshPorts;
document.getElementById('s-angle').addEventListener('input', drawCanvas);
bindSingleStepPopovers();

applyStatus({state:'disconnected'});
refreshPorts();
wsConnect();
drawCanvas();
renderServoList();
setInterval(refreshPorts, 5000);
</script>
